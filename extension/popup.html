<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Chat With This Page</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <span class="title">Chat With This Page</span>
      <button id="optionsBtn" title="Settings">&#9881;</button>
    </header>
    <div id="messages"></div>
    <form id="askForm">
      <textarea id="question" rows="2" placeholder="Ask about this page..."></textarea>
      <button id="sendBtn" type="submit">Send</button>
    </form>
    <script src="popup.js"></script>
  </body>
</html>
