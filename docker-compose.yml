services:
  backend:
    image: ${IMAGE_NAME:-changeme/chatwithpage-backend}:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    ports:
      - "3001:3001"

volumes:
  uptime-kuma-data:
