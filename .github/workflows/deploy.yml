name: Build & Push

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute tags
        id: meta
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          # Strip any whitespace (e.g. a trailing newline from how the
          # secret was pasted in) — an unstripped value here silently
          # breaks the "echo ... >> $GITHUB_OUTPUT" file-command format.
          DOCKERHUB_USER="$(printf '%s' "${DOCKERHUB_USERNAME}" | tr -d '[:space:]')"
          IMAGE_NAME="${DOCKERHUB_USER}/chatwithpage-backend"
          SHA_TAG="${GITHUB_SHA::7}"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          TAGS="${IMAGE_NAME}:${SHA_TAG},${IMAGE_NAME}:latest"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAGS="${TAGS},${IMAGE_NAME}:${GITHUB_REF_NAME}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy-to-EC2 job removed for now — add it back here later
  # (scp docker-compose.yml + ssh `docker compose pull && up -d`,
  # see deploy/ec2-setup.sh for the host-side bootstrap it expects).
